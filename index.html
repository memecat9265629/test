<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile & Menu Example</title>
    <style>
        /* CSS */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .profile-container {
            text-align: center;
            margin-top: 20px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
        }

        .profile-title {
            font-size: 24px;
            margin-top: 10px;
        }

        .hamburger-menu {
            display: flex;
            justify-content: center;
            cursor: pointer;
            margin: 20px 0;
        }

        .hamburger-line {
            width: 30px;
            height: 4px;
            background-color: #333;
            margin: 4px 0;
        }

        .sidebar-menu {
            display: none; /* Hidden by default */
            position: fixed;
            left: 0;
            top: 0;
            width: 200px;
            height: 100%;
            background-color: #222;
            color: white;
            padding-top: 60px;
        }

        .sidebar-menu ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar-menu ul li {
            padding: 15px;
        }

        .sidebar-menu ul li a {
            color: white;
            text-decoration: none;
            display: block;
        }

        .sidebar-menu ul li a.active, .sidebar-menu ul li a:hover {
            background-color: #444;
        }

        .app-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .app-item {
            text-align: center;
            margin: 15px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 10px;
        }

        .app-name {
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- Profile Image and Title Section -->
    <div class="profile-container">
        <img src="profile-image.jpg" alt="Profile Image" class="profile-image">
        <h1 class="profile-title">Your Title Name Here</h1>
    </div>

    <!-- Hamburger Menu Icon -->
    <div class="hamburger-menu">
        <div class="hamburger-line"></div>
        <div class="hamburger-line"></div>
        <div class="hamburger-line"></div>
    </div>

    <!-- Sidebar Menu -->
    <nav class="sidebar-menu">
        <ul>
            <li><a href="#" class="active">Main Tab</a></li>
            <li><a href="#">App List Tab</a></li>
        </ul>
    </nav>

    <!-- App List Section -->
    <div class="app-list">
        <div class="app-item">
            <img src="app-icon1.png" alt="App 1 Image" class="app-icon">
            <h3 class="app-name">App 1 Name</h3>
        </div>
        <div class="app-item">
            <img src="app-icon2.png" alt="App 2 Image" class="app-icon">
            <h3 class="app-name">App 2 Name</h3>
        </div>
        <!-- Add more app items as needed -->
    </div>

    <script>
        // JavaScript
        const hamburgerMenu = document.querySelector('.hamburger-menu');
        const sidebarMenu = document.querySelector('.sidebar-menu');

        hamburgerMenu.addEventListener('click', () => {
            sidebarMenu.classList.toggle('active');
        });

        // Close sidebar menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!hamburgerMenu.contains(e.target) && !sidebarMenu.contains(e.target)) {
                sidebarMenu.classList.remove('active');
            }
        });
    </script>

</body>
</html>
