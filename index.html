<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Time and Font Example</title>
    
    <!-- Linking the font from DaFont -->
    <link href="https://example.com/path-to-font.woff2" rel="stylesheet" type="text/css">
    
    <style>
        body {
            font-family: 'Cute_Cat', sans-serif; /* Replace 'YourChosenFont' with the actual font name */
            text-align: center;
            margin-top: 50px;
        }
        
        .current-time {
            font-size: 24px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="current-time" id="time"></div>
    
    <script>
        function updateTime() {
            const timeElement = document.getElementById('time');
            const currentTime = new Date();
            const hours = currentTime.getHours();
            const minutes = currentTime.getMinutes().toString().padStart(2, '0');
            const seconds = currentTime.getSeconds().toString().padStart(2, '0');
            const amPm = hours >= 12 ? 'PM' : 'AM';
            
            const formattedTime = `${hours % 12 || 12}:${minutes}:${seconds} ${amPm}`;
            timeElement.textContent = formattedTime;
        }
        
        setInterval(updateTime, 1000); // Update every second
        updateTime(); // Call initially to set the time right away
    </script>
</body>
</html>
