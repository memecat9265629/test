<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch IPA from iTunes URL</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        form {
            max-width: 400px;
            margin: 0 auto;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Fetch IPA from iTunes URL</h1>
    <form id="itunesForm">
        <label for="itunesUrl">Enter iTunes App Store URL:</label>
        <input type="text" id="itunesUrl" name="itunesUrl" placeholder="e.g., https://itunes.apple.com/app/id123456789">
        <button type="submit">Get IPA</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('itunesForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const itunesUrl = document.getElementById('itunesUrl').value;

            if (!itunesUrl) {
                document.getElementById('result').innerHTML = '<p>Please enter a valid iTunes URL.</p>';
                return;
            }

            // Replace this URL with your backend or API URL that handles the iTunes URL and returns the IPA.
            const apiUrl = 'https://example.com/get-ipa'; 

            fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ url: itunesUrl }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('result').innerHTML = `<p>Download IPA: <a href="${data.ipaUrl}" target="_blank">Click Here</a></p>`;
                } else {
                    document.getElementById('result').innerHTML = `<p>Error: ${data.error}</p>`;
                }
            })
            .catch(error => {
                document.getElementById('result').innerHTML = `<p>Something went wrong: ${error.message}</p>`;
            });
        });
    </script>
</body>
</html>
