<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .search-bar {
            margin: 16px;
        }
        .search-bar input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--input-border-color);
            border-radius: 4px;
            font-size: 16px;
            background-color: var(--input-bg-color);
            color: var(--text-color);
        }
        .search-bar input:focus {
            border-color: var(--focus-border-color);
            outline: none;
        }
        .app-card {
            border: 1px solid var(--card-border-color);
            padding: 16px;
            margin: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            background-color: var(--card-bg-color);
        }
        .app-image {
            width: 100px;
            height: 100px;
            border-radius: 8px; /* App image border-radius */
            margin-right: 16px;
        }
        .app-details {
            flex-grow: 1;
        }
        .app-name {
            font-weight: bold;
            margin: 8px 0;
        }
        .app-version {
            color: gray;
            margin-bottom: 8px;
        }
        .app-button {
            display: flex;
            align-items: center;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            padding: 8px;
        }
        .app-button img {
            width: 40px; /* Adjust image size as needed */
            height: 40px;
        }
        .clock {
            text-align: center;
            padding: 16px;
            background-color: var(--clock-bg-color);
            border-top: 1px solid var(--card-border-color);
        }

        /* Dark mode styles */
        .dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --input-bg-color: #1e1e1e;
            --input-border-color: #555555;
            --focus-border-color: #007BFF;
            --card-bg-color: #1e1e1e;
            --card-border-color: #555555;
            --clock-bg-color: #1e1e1e;
        }

        /* Light mode styles (default) */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --input-bg-color: #ffffff;
            --input-border-color: #ddd;
            --focus-border-color: #007BFF;
            --card-bg-color: #ffffff;
            --card-border-color: #ddd;
            --clock-bg-color: #f4f4f4;
        }

        /* Toggle for dark/light mode */
        .toggle-dark-mode {
            position: absolute;
            top: 16px;
            right: 16px;
            cursor: pointer;
            background-color: var(--card-bg-color);
            border: none;
            padding: 8px;
            border-radius: 4px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="toggle-dark-mode" onclick="toggleDarkMode()">Toggle Dark Mode</button>

        <div class="search-bar">
            <input type="text" id="search" placeholder="Search apps...">
        </div>

        <div class="app-list">
            <!-- App Card Example -->
            <div class="app-card">
                <img src="app-image.png" alt="App Image" class="app-image">
                <div class="app-details">
                    <div class="app-name">App Name</div>
                    <div class="app-version">Version: 1.0.0</div>
                </div>
                <a href="app-link.html" class="app-button">
                    <img src="button-icon.png" alt="App Button Icon"> 
                </a>
            </div>
        </div>

        <!-- Clock -->
        <div class="clock">
            <p>Current Time: <span id="clock-time">??:??:??</span> PM</p>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const amPm = hours >= 12 ? 'PM' : 'AM';
            
            document.getElementById('clock-time').textContent = `${hours}:${minutes}:${seconds} ${amPm}`;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        setInterval(updateClock, 1000);
        updateClock();  // Call immediately to set the clock on page load
    </script>

</body>
</html>
