<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .search-container {
            margin-bottom: 20px;
        }
        .app-list {
            list-style: none;
            padding: 0;
        }
        .app-item {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .app-item img {
            max-width: 100px;
            margin-right: 10px;
        }
        .app-item h3 {
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <label for="search-term">Search Apps:</label>
        <input type="text" id="search-term" placeholder="Enter app name">
        <label for="country">Country:</label>
        <select id="country">
            <option value="us">United States</option>
            <option value="uk">United Kingdom</option>
            <option value="ca">Canada</option>
            <!-- Add other countries as needed -->
        </select>
        <button onclick="searchApps()">Search</button>
    </div>

    <ul id="app-list" class="app-list"></ul>

    <script>
        async function searchApps() {
            const searchTerm = document.getElementById('search-term').value.trim();
            const country = document.getElementById('country').value;
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(searchTerm)}&country=${country}&media=software&limit=10`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                displayApps(data.results);
            } catch (error) {
                console.error('Error fetching app data:', error);
            }
        }

        function displayApps(apps) {
            const appList = document.getElementById('app-list');
            appList.innerHTML = '';

            if (apps.length === 0) {
                appList.innerHTML = '<li>No apps found.</li>';
                return;
            }

            apps.forEach(app => {
                const appItem = document.createElement('li');
                appItem.className = 'app-item';

                appItem.innerHTML = `
                    <img src="${app.artworkUrl60}" alt="${app.trackName}">
                    <div>
                        <h3>${app.trackName}</h3>
                        <p>Bundle ID: ${app.bundleId}</p>
                        <p>iOS Version: ${app.minimumOsVersion}</p>
                        <p><a href="${app.trackViewUrl}" target="_blank">View on App Store</a></p>
                    </div>
                `;

                appList.appendChild(appItem);
            });
        }
    </script>

</body>
</html>
