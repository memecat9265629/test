<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .app-card {
            border: 1px solid #ddd;
            padding: 16px;
            margin: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
        }
        .app-image {
            width: 100px;
            height: 100px;
            margin-right: 16px;
        }
        .app-details {
            flex-grow: 1;
        }
        .app-name {
            font-weight: bold;
            margin: 8px 0;
        }
        .app-version {
            color: gray;
            margin-bottom: 8px;
        }
        .app-button {
            padding: 8px 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .app-button a {
            color: white;
            text-decoration: none;
        }
        .search-bar {
            margin: 16px;
        }
        .clock {
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="search-bar">
        <input type="text" id="search" placeholder="Search apps...">
    </div>

    <div class="app-list">
        <!-- App Card Example -->
        <div class="app-card">
            <img src="app-image.png" alt="App Image" class="app-image">
            <div class="app-details">
                <div class="app-name">App Name</div>
                <div class="app-version">Version: 1.0.0</div>
                <button class="app-button"><a href="app-link.html">Visit App</a></button>
            </div>
        </div>
    </div>

    <!-- Clock -->
    <div class="clock">
        <p>Current Time: <span id="clock-time">??:??:??</span> PM</p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const amPm = hours >= 12 ? 'PM' : 'AM';
            
            document.getElementById('clock-time').textContent = `${hours}:${minutes}:${seconds} ${amPm}`;
        }

        setInterval(updateClock, 1000);
        updateClock();  // Call immediately to set the clock on page load
    </script>

</body>
</html>
