<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store URL Input</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enter App Store URL</h2>
        <form id="appForm">
            <input type="text" id="appURL" placeholder="https://apps.apple.com/country/app/name/idnumber" required>
            <input type="submit" value="Get IPA">
        </form>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('appForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const appURL = document.getElementById('appURL').value;
            const urlPattern = /https:\/\/apps\.apple\.com\/[a-z]{2}\/app\/[a-z0-9\-]+\/(\d+)/i;
            const match = appURL.match(urlPattern);
            
            if (!match) {
                document.getElementById('result').innerText = 'Invalid App Store URL. Please enter a valid URL.';
                return;
            }
            
            const appId = match[1];
            
            try {
                // You need to replace this URL with a real API if available
                const apiURL = `https://api.example.com/get_ipa?app_id=${appId}`;
                const response = await fetch(apiURL);
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('result').innerText = `IPA Download Link: ${data.ipaUrl}`;
                } else {
                    document.getElementById('result').innerText = 'Failed to retrieve IPA. Please try again later.';
                }
            } catch (error) {
                document.getElementById('result').innerText = 'An error occurred while fetching IPA.';
            }
        });
    </script>
</body>
</html>
