<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Store Info</title>
  <style>
    /* Basic Styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Header Styling */
    header {
      background-color: #007aff;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header form {
      margin-top: 10px;
    }

    header form input,
    header form select,
    header form button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
    }

    header form button {
      background-color: #0056cc;
      color: white;
      cursor: pointer;
    }

    header form button:hover {
      background-color: #003f99;
    }

    /* Main Content Styling */
    main {
      padding: 20px;
    }

    #appList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .appCard {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease-in-out;
    }

    .appCard:hover {
      transform: translateY(-5px);
    }

    .appCard img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .appCard h3 {
      font-size: 18px;
      margin: 10px 0;
    }

    .appCard p {
      font-size: 14px;
      margin: 5px 0;
    }

    .appCard button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    .appCard .get-ipa {
      background-color: #28a745;
      color: white;
    }

    .appCard .get-ipa:hover {
      background-color: #1c7c32;
    }

    .appCard .view-itunes {
      background-color: #007aff;
      color: white;
    }

    .appCard .view-itunes:hover {
      background-color: #0056cc;
    }
  </style>
</head>
<body>
  <header>
    <h1>App Store Search</h1>
    <form id="searchForm">
      <input type="text" id="searchInput" placeholder="Search for apps..." required>
      <select id="countrySelect">
        <option value="us">United States</option>
        <option value="gb">United Kingdom</option>
        <option value="jp">Japan</option>
        <option value="de">Germany</option>
        <option value="kr">South Korea</option>
        <option value="fr">France</option>
        <option value="zh">China</option>
        <option value="vn">Vietnam</option>
      </select>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="ja">Japanese</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ko">Korean</option>
        <option value="zh-Hans">Simplified Chinese</option>
        <option value="vi">Vietnamese</option>
      </select>
      <button type="submit">Search</button>
    </form>
  </header>
  <main>
    <div id="appList"></div>
  </main>
  <script>
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const countrySelect = document.getElementById('countrySelect');
    const languageSelect = document.getElementById('languageSelect');
    const appList = document.getElementById('appList');

    searchForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const query = searchInput.value.trim();
      const country = countrySelect.value;
      const language = languageSelect.value;

      if (!query) return alert('Please enter a search term.');

      const apiUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=software&country=${country}&lang=${language}`;

      try {
        const response = await fetch(apiUrl);
        const data = await response.json();

        if (data.results.length === 0) {
          appList.innerHTML = '<p>No apps found.</p>';
          return;
        }

        displayApps(data.results);
      } catch (error) {
        console.error('Error fetching data:', error);
        appList.innerHTML = '<p>Failed to load apps. Please try again later.</p>';
      }
    });

    function displayApps(apps) {
      appList.innerHTML = '';

      apps.forEach((app) => {
        const appCard = document.createElement('div');
        appCard.classList.add('appCard');

        appCard.innerHTML = `
          <img src="${app.artworkUrl100}" alt="${app.trackName}">
          <h3>${app.trackName}</h3>
          <p><strong>Bundle ID:</strong> ${app.bundleId}</p>
          <p><strong>Price:</strong> ${app.formattedPrice || 'Free'}</p>
          <p><strong>Requires:</strong> iOS ${app.minimumOsVersion}</p>
          <button class="get-ipa">Get IPA</button>
          <button class="view-itunes" onclick="window.open('${app.trackViewUrl}', '_blank')">View on iTunes</button>
        `;

        const getIPAButton = appCard.querySelector('.get-ipa');
        getIPAButton.addEventListener('click', () => {
          alert('Downloading IPA is not supported in this script.');
        });

        appList.appendChild(appCard);
      });
    }
  </script>
</body>
</html>
