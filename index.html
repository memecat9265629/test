<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Web Page</title>
    <style>
        body {
            font-family: 'YourCustomFontName', sans-serif; /* Replace 'YourCustomFontName' with the actual font name from DaFont */
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
            margin-top: 20px;
        }
        .time {
            font-size: 24px;
        }
        .speed {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Current Time:</h1>
        <p class="time" id="current-time"></p>
        <p class="speed">Your Internet Speed: Mbps: <span id="internet-speed">??</span></p>
    </div>

    <script>
        // Display the current time
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const amPm = hours >= 12 ? 'PM' : 'AM';
            const formattedTime = `${hours}:${minutes}:${seconds} ${amPm}`;
            document.getElementById('current-time').textContent = formattedTime;
        }

        // Set an interval to update the time every second
        setInterval(updateTime, 1000);

        // Simulate an internet speed (replace ?? with actual value if known)
        document.getElementById('internet-speed').textContent = '??'; // Replace with actual value if known
    </script>

</body>
</html>
