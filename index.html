<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTunes App List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .app-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .app-item {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            width: calc(33.333% - 40px); /* 3 columns layout */
        }
        .app-item img {
            max-width: 100%;
            height: auto;
        }
        .app-item h3 {
            margin: 10px 0;
        }
        .app-item p {
            margin: 5px 0;
        }
        .search-container {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <label for="search-term">Search App:</label>
        <input type="text" id="search-term" placeholder="Enter app name">
        <label for="country">Select Country:</label>
        <select id="country">
            <option value="us">United States</option>
            <option value="gb">United Kingdom</option>
            <option value="jp">Japan</option>
            <!-- Add more countries as needed -->
        </select>
        <label for="language">Select Language:</label>
        <select id="language">
            <option value="en">English</option>
            <option value="ja">Japanese</option>
            <option value="fr">French</option>
            <!-- Add more languages as needed -->
        </select>
        <button onclick="fetchAppData()">Search</button>
    </div>

    <div class="app-list" id="app-list">
        <!-- App items will be populated here -->
    </div>

    <script>
        async function fetchAppData() {
            const searchTerm = document.getElementById('search-term').value.trim();
            const country = document.getElementById('country').value;
            const language = document.getElementById('language').value;
            const apiUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(searchTerm)}&country=${country}&lang=${language}&media=software&limit=20`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                displayAppList(data.results);
            } catch (error) {
                console.error('Error fetching app data:', error);
            }
        }

        function displayAppList(apps) {
            const appListContainer = document.getElementById('app-list');
            appListContainer.innerHTML = '';

            if (apps.length === 0) {
                appListContainer.innerHTML = '<p>No apps found.</p>';
                return;
            }

            apps.forEach(app => {
                const appItem = document.createElement('div');
                appItem.className = 'app-item';
                appItem.innerHTML = `
                    <img src="${app.artworkUrl100}" alt="${app.trackName}">
                    <h3>${app.trackName}</h3>
                    <p><strong>Bundle:</strong> ${app.bundleId}</p>
                    <p><strong>Version:</strong> ${app.version}</p>
                    <p><strong>Requires iOS:</strong> ${app.minimumOsVersion}</p>
                    <p><a href="${app.trackViewUrl}" target="_blank">View on iTunes</a></p>
                `;

                appListContainer.appendChild(appItem);
            });
        }
    </script>

</body>
</html>
