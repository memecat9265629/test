<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTunes App Store API Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .search-container {
            margin-bottom: 20px;
        }

        .app-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .app-card {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .app-card img {
            width: 100%;
            height: auto;
        }

        .app-card h2 {
            font-size: 1.2em;
        }

        .app-card a {
            display: block;
            margin-top: 10px;
            text-align: center;
            background-color: #007bff;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-decoration: none;
        }

        .app-card a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>iTunes App Store API Search</h1>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for apps..." oninput="searchApps()">
        <label for="country">Country:</label>
        <select id="country">
            <option value="us">United States</option>
            <option value="gb">United Kingdom</option>
            <option value="jp">Japan</option>
            <!-- Add more countries as needed -->
        </select>
        <label for="language">Language:</label>
        <select id="language">
            <option value="en">English</option>
            <option value="ja">Japanese</option>
            <!-- Add more languages as needed -->
        </select>
    </div>

    <div id="app-list" class="app-list">
        <!-- App cards will be injected here by JavaScript -->
    </div>

    <script>
        const apiUrl = 'https://itunes.apple.com/search'; // iTunes API endpoint
        let appList = [];

        async function fetchApps(query = '', country = 'us', language = 'en') {
            const url = `${apiUrl}?term=${query}&country=${country}&language=${language}&entity=software&limit=50`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    appList = data.results;
                    displayApps(appList);
                } else {
                    document.getElementById('app-list').innerHTML = '<p>No results found.</p>';
                }
            } catch (error) {
                console.error('Error fetching apps:', error);
            }
        }

        function displayApps(apps) {
            const appListContainer = document.getElementById('app-list');
            appListContainer.innerHTML = '';

            apps.forEach(app => {
                const appCard = document.createElement('div');
                appCard.classList.add('app-card');
                appCard.innerHTML = `
                    <img src="${app.artworkUrl100}" alt="${app.trackName} icon">
                    <h2>${app.trackName}</h2>
                    <p>Version: ${app.version}</p>
                    <p>Requires: ${app.minimumOsVersion}</p>
                    <a href="${app.trackViewUrl}" target="_blank">View on App Store</a>
                `;
                appListContainer.appendChild(appCard);
            });
        }

        function searchApps() {
            const query = document.getElementById('search-input').value;
            const country = document.getElementById('country').value;
            const language = document.getElementById('language').value;
            fetchApps(query, country, language);
        }

        // Initial fetch to display some apps
        fetchApps();
    </script>

</body>
</html>
