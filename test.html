<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Page</title>
    <style>
        /* Basic styles for the game page */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e1e;
            color: white;
            text-align: center;
        }
        .game-title {
            font-size: 2em;
            margin-top: 20px;
        }
        .game-card {
            background: #333;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        .game-card img {
            width: 200px;
            height: auto;
            border-radius: 5px;
        }
        .play-button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .fps-setting {
            margin: 20px;
        }
    </style>
</head>
<body>

    <h1 class="game-title">Welcome to the Gamaverse!</h1>
    
    <div class="game-card">
        <img src="game-image.jpg" alt="Game Image">
        <h2>Game Title</h2>
        <p>Last Seen Online: 2 hours ago</p>
        <button class="play-button">Play Game</button>
    </div>
    
    <div class="fps-setting">
        <label for="fps">Set FPS: </label>
        <input type="number" id="fps" value="120" min="30" max="240">
    </div>
    
    <script>
        // JavaScript to handle FPS input and play button click
        const fpsInput = document.getElementById('fps');
        fpsInput.addEventListener('input', (e) => {
            const fps = e.target.value;
            console.log(`FPS set to: ${fps}`); // Here you could adjust game FPS dynamically
        });

        const playButton = document.querySelector('.play-button');
        playButton.addEventListener('click', () => {
            alert('Game starting!'); // Replace this with your game logic
        });
    </script>

</body>
</html>
